# Updated netplan for Cheap VM after NATswitch fix
# Copy to /etc/netplan/00-installer-config.yaml on Cheap VM
# Apply with: sudo netplan apply
network:
  version: 2
  ethernets:
    eth0:
      addresses:
        - 192.168.100.1/24
      routes:
        - to: default
          via: 192.168.100.254
      nameservers:
        addresses:
          - 8.8.8.8
          - 8.8.4.4
