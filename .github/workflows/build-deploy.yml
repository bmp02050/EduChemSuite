name: Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore .NET packages
        run: dotnet restore EduChemSuite.API/EduChemSuite.API.sln

      - name: Check for vulnerable .NET packages
        run: |
          OUTPUT=$(dotnet list EduChemSuite.API/EduChemSuite.API.sln package --vulnerable --include-transitive 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qiE '(High|Critical)'; then
            echo "::error::High or Critical vulnerabilities found in .NET dependencies"
            exit 1
          fi

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install UI dependencies
        run: npm ci
        working-directory: EduChemSuite.UI/UI

      - name: Audit UI dependencies
        run: npm audit --audit-level=high
        working-directory: EduChemSuite.UI/UI

  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase repo name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: EduChemSuite.API/Dockerfile
          push: false
          load: true
          no-cache: true
          tags: |
            ghcr.io/${{ env.REPO }}/api:latest
            ghcr.io/${{ env.REPO }}/api:${{ github.sha }}

      - name: Scan API image for vulnerabilities
        uses: aquasecurity/trivy-action@0.21.0
        with:
          image-ref: ghcr.io/${{ env.REPO }}/api:latest
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push API image
        run: |
          docker push ghcr.io/${{ env.REPO }}/api:latest
          docker push ghcr.io/${{ env.REPO }}/api:${{ github.sha }}

      - name: Build UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: EduChemSuite.UI/Dockerfile
          push: false
          load: true
          no-cache: true
          tags: |
            ghcr.io/${{ env.REPO }}/ui:latest
            ghcr.io/${{ env.REPO }}/ui:${{ github.sha }}

      - name: Scan UI image for vulnerabilities
        uses: aquasecurity/trivy-action@0.21.0
        with:
          image-ref: ghcr.io/${{ env.REPO }}/ui:latest
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push UI image
        run: |
          docker push ghcr.io/${{ env.REPO }}/ui:latest
          docker push ghcr.io/${{ env.REPO }}/ui:${{ github.sha }}

  deploy:
    needs: [build-and-push, security-audit]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (blue-green)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            bash deploy.sh ${{ github.sha }}
