<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect x="2" y="2" width="96" height="96" rx="16" ry="16" fill="#1a237e"/>
  <!-- Single tilted orbit -->
  <ellipse cx="50" cy="50" rx="40" ry="20" fill="none" stroke="#26c6da" stroke-width="1.8" opacity="0.5" transform="rotate(-20 50 50)"/>
  <!-- Electron dot -->
  <circle cx="14" cy="42" r="3" fill="#4dd0e1"/>
  <!-- ECS text -->
  <text x="50" y="50" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="central" letter-spacing="3">ECS</text>
</svg>
