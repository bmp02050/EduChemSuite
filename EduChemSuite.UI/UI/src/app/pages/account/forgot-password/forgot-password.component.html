<div class="page-container-center">
  @if (!submitted) {
    <nz-card class="auth-card" nzTitle="Forgot Password">
      <form nz-form [formGroup]="form" (ngSubmit)="onSubmit()" nzLayout="vertical">
        <p>Enter your email address and we'll send you a link to reset your password.</p>
        <nz-form-item>
          <nz-form-label nzRequired>Email</nz-form-label>
          <nz-form-control nzErrorTip="Please enter a valid email">
            <input nz-input formControlName="email" placeholder="Enter your email" type="email" />
          </nz-form-control>
        </nz-form-item>
        <nz-form-item>
          <nz-form-control>
            <button nz-button nzType="primary" nzBlock [nzLoading]="loading" type="submit">Send Reset Link</button>
          </nz-form-control>
        </nz-form-item>
        <div class="back-link">
          <a routerLink="/account/login">Back to Login</a>
        </div>
      </form>
    </nz-card>
  }

  @if (submitted) {
    <nz-result
      nzStatus="success"
      nzTitle="Check Your Email"
      nzSubTitle="If an account with that email exists, a password reset link has been sent.">
      <div nz-result-extra>
        <button nz-button nzType="primary" routerLink="/account/login">Back to Login</button>
      </div>
    </nz-result>
  }
</div>
