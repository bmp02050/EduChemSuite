<div class="page-container-center">
  @if (errorMessage && !success) {
    <nz-result
      nzStatus="error"
      nzTitle="Reset Failed"
      [nzSubTitle]="errorMessage">
      <div nz-result-extra>
        <button nz-button nzType="primary" routerLink="/account/login">Go to Login</button>
      </div>
    </nz-result>
  }

  @if (!errorMessage && !success) {
    <nz-card class="auth-card" nzTitle="Reset Password">
      <form nz-form [formGroup]="form" (ngSubmit)="onSubmit()" nzLayout="vertical">
        <nz-form-item>
          <nz-form-label nzRequired>New Password</nz-form-label>
          <nz-form-control nzErrorTip="Password must be at least 6 characters">
            <input nz-input formControlName="newPassword" type="password" placeholder="Enter new password" />
          </nz-form-control>
        </nz-form-item>
        <nz-form-item>
          <nz-form-label nzRequired>Confirm Password</nz-form-label>
          <nz-form-control nzErrorTip="Confirm password is required">
            <input nz-input formControlName="confirmPassword" type="password" placeholder="Confirm new password" />
          </nz-form-control>
        </nz-form-item>
        <nz-form-item>
          <nz-form-control>
            <button nz-button nzType="primary" nzBlock [nzLoading]="loading" type="submit">Reset Password</button>
          </nz-form-control>
        </nz-form-item>
        <alert></alert>
      </form>
    </nz-card>
  }

  @if (success) {
    <nz-result
      nzStatus="success"
      nzTitle="Password Reset!"
      nzSubTitle="Your password has been reset successfully. You can now log in with your new password.">
      <div nz-result-extra>
        <button nz-button nzType="primary" routerLink="/account/login">Go to Login</button>
      </div>
    </nz-result>
  }
</div>
