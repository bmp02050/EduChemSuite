<div class="container col-md-6 offset-md-3 mt-5">
  <div class="card">
    <h4 class="card-header">Login</h4>
    <div class="card-body">
      <form (ngSubmit)="onSubmit()" [formGroup]="form">
        <div class="mb-3">
          <label class="form-label">email</label>
          <input [ngClass]="{ 'is-invalid': submitted && f['email'].errors }" class="form-control" formControlName="email"
                 type="text"/>
          <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
            <div *ngIf="f['email'].errors?.['required']">email is required</div>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input [ngClass]="{ 'is-invalid': submitted && f['password'].errors }" class="form-control" formControlName="password"
                 type="password"/>
          <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
            <div *ngIf="f['password'].errors?.['required']">Password is required</div>
          </div>
        </div>
        <div>
          <button [disabled]="loading" class="btn btn-primary">
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
            Login
          </button>
          <a class="btn btn-link" routerLink="../register">Register</a>
        </div>
        <alert></alert>
      </form>
    </div>
  </div>
</div>
